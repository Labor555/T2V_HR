model:
  model_path: /data/pretrained/Wan2.1-T2V-1.3B
  format: legacy
  vae_weight: Wan2.1_VAE.pth
  torch_dtype: bf16

lsr:
  checkpoint: /data/user/lbzhu/T2V_HR/outputs/wan13b_lsr_smoke/checkpoints/latest.pt
  scale_factor: 2

generation:
  prompt: "high quality video"
  low_resolution: [240, 416]
  high_resolution: [480, 832]
  num_frames: 17
  num_inference_steps: 50
  refine_strength: 0.35
  seed: 1234

rna:
  base_strength: 0.02
  detail_strength: 0.12
  edge_weight: 0.0
  temporal_weight: 0.3
  latent_weight: 0.5
  smooth_kernel: 5
  gamma: 1.0

output:
  dir: /data/user/lbzhu/T2V_HR/outputs/infer_lsrna_smoke
