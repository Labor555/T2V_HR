seed: 1234
precision: fp32
output_dir: outputs/smoke_lsr

data:
  cache_index: ""
  batch_size: 2
  num_workers: 0
  random_crop:
    enabled: true
    hr_size: [32, 32]

model:
  in_channels: 16
  hidden_channels: 64
  num_blocks: 4
  temporal_kernel: 3
  scale_factor: 2
  use_text: false

train:
  max_steps: 2
  lr: 0.0002
  log_every: 1
  save_every: 1000
  grad_clip: 1.0

loss:
  latent_l1: 1.0
  temporal_l1: 0.1
  downsample_l1: 0.1

