seed: 1234
precision: bf16
output_dir: outputs/wan13b_lsr_2x

data:
  cache_index: /data/labor/T2V_HR/cache/wan13b_latents/index.jsonl
  batch_size: 1
  num_workers: 4
  random_crop:
    enabled: true
    hr_size: [64, 64]

model:
  in_channels: 16
  hidden_channels: 128
  num_blocks: 8
  temporal_kernel: 3
  scale_factor: 2
  use_text: false

train:
  max_steps: 100000
  lr: 0.0002
  log_every: 50
  save_every: 5000
  grad_clip: 1.0

loss:
  latent_l1: 1.0
  temporal_l1: 0.1
  downsample_l1: 0.1

